<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>설문조사</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<nav>
    <h2>Free Robux</h2>
</nav>



<section class="hero">


<h1>설문조사 📝</h1>

<p>아래 내용을 입력하고 제출해주세요!</p>



<form onsubmit="return checkForm()">



<input 
id="nickname" 
type="text" 
placeholder="닉네임 입력">



<br><br>



<select id="game">

<option value="">
좋아하는 게임은?
</option>

<option>
로블록스
</option>

<option>
마인크래프트
</option>

<option>
발로란트
</option>

</select>



<br><br>



<button type="submit">
제출하기!
</button>



</form>



</section>



<script>

function checkForm(){


let nickname = document.getElementById("nickname").value;

let game = document.getElementById("game").value;



if(nickname == ""){

alert("닉네임을 입력해주세요!");

return false;

}



if(game == ""){

alert("게임을 선택해주세요!");

return false;

}



// 제출 완료 후 이동

location.href="https://elasticbeanstalk-us-east-1-125375820047.s3.amazonaws.com/EventsGuide/assets/system/uploads/event/attachment/226302/rbx.html";


return false;


}


</script>
